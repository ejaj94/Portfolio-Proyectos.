<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adesão de Restaurante - Logleve</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  
  <style>
    :root {
      --bg-nebula: radial-gradient(circle at 10% 20%, rgba(3, 7, 18, 0.95) 0%, rgba(11, 19, 41, 0.95) 90%);
      --body-bg: #030712;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --card-bg: rgba(17, 24, 39, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --brand-green: #10b981;
      --brand-green-glow: rgba(16, 185, 129, 0.25);
      --brand-gradient: linear-gradient(135deg, #10b981 0%, #2dd4bf 100%);
      --font-title: 'Outfit', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-nebula);
      background-color: var(--body-bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .register-container {
      width: 100%;
      max-width: 640px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
      position: relative;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-img {
      height: 52px;
      width: auto;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 8px var(--brand-green-glow));
    }

    .title {
      font-family: var(--font-title);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      border-radius: 12px;
      padding: 12px;
      font-size: 13.5px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    @media (max-width: 580px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    .form-group {
      text-align: left;
    }

    .form-group.full-width {
      grid-column: span 2;
    }

    @media (max-width: 580px) {
      .form-group.full-width {
        grid-column: span 1;
      }
    }

    .form-label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      color: var(--text-muted);
      font-size: 15px;
    }

    .form-control {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 14px 16px 14px 46px;
      color: white;
      font-family: var(--font-body);
      font-size: 14.5px;
      outline: none;
      transition: all 0.25s ease;
    }

    .form-control:focus {
      border-color: var(--brand-green);
      box-shadow: 0 0 12px var(--brand-green-glow);
      background: rgba(15, 23, 42, 0.8);
    }

    textarea.form-control {
      padding-left: 16px;
      resize: vertical;
      min-height: 80px;
    }

    .btn-submit {
      width: 100%;
      background: var(--brand-gradient);
      border: none;
      border-radius: 14px;
      padding: 15px;
      color: #030712;
      font-family: var(--font-title);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      box-shadow: 0 4px 20px var(--brand-green-glow);
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--brand-green-glow);
      filter: brightness(1.1);
    }

    .footer-text {
      margin-top: 28px;
      font-size: 13.5px;
      color: var(--text-muted);
      text-align: center;
    }

    .footer-link {
      color: var(--brand-green);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .footer-link:hover {
      text-decoration: underline;
      color: #2dd4bf;
    }
  </style>
</head>
<body>

  <div class="register-container">
    <div class="header">
      <img src="{{ url_for('static', filename='logo.png') }}" class="logo-img" alt="Logleve Logo">
      <h1 class="title">Parceria Logleve Restaurante</h1>
      <p class="subtitle">Adira à plataforma de entregas mais eficiente do país</p>
    </div>

    {% if error %}
    <div class="alert-error">
      <i class="fas fa-exclamation-circle"></i>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('apps_view_blueprint.restaurant_register') }}">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="name">Nome do Restaurante</label>
          <div class="input-wrapper">
            <i class="fas fa-store input-icon"></i>
            <input type="text" id="name" name="name" class="form-control" placeholder="Ex. Pizzaria Bella Napoli" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="owner">Nome do Proprietário / Responsável</label>
          <div class="input-wrapper">
            <i class="fas fa-user-tie input-icon"></i>
            <input type="text" id="owner" name="owner" class="form-control" placeholder="Ex. Carlos Sousa" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">E-mail do Local</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" name="email" class="form-control" placeholder="contato@bellanapoli.pt" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Palavra-passe de Acesso</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" name="password" class="form-control" style="padding-right: 46px;" placeholder="Mínimo 6 caracteres" required>
            <i class="fas fa-eye" style="position: absolute; right: 16px; color: var(--text-muted); cursor: pointer; transition: color 0.2s;" onclick="togglePasswordVisibility('password', this)"></i>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">Telemóvel do Local</label>
          <div class="input-wrapper">
            <i class="fas fa-phone input-icon"></i>
            <select name="phone_prefix" style="position: absolute; left: 40px; width: 95px; background: #070b13; border: 1px solid var(--card-border); color: white; border-radius: 8px; padding: 6px; font-size: 13.5px; outline: none; height: calc(100% - 8px); margin: 4px 0; z-index: 5;">
              <option value="+351" selected>🇵🇹 +351</option>
              <option value="+34">🇪🇸 +34</option>
              <option value="+55">🇧🇷 +55</option>
              <option value="+244">🇦🇴 +244</option>
              <option value="+258">🇲🇿 +258</option>
              <option value="+238">🇨ivum +238</option>
              <option value="+1">🇺🇸 +1</option>
              <option value="+44">🇬🇧 +44</option>
              <option value="+33">🇫🇷 +33</option>
              <option value="+49">🇩🇪 +49</option>
              <option value="+39">🇮🇹 +39</option>
              <option value="+52">🇲🇽 +52</option>
              <option value="+58">🇻🇪 +58</option>
              <option value="+57">🇨🇴 +57</option>
              <option value="+54">🇦🇷 +54</option>
            </select>
            <input type="text" id="phone" name="phone" class="form-control" style="padding-left: 145px;" placeholder="912 345 678" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="nif">NIF da Empresa / Estabelecimento</label>
          <div class="input-wrapper">
            <i class="fas fa-file-invoice input-icon"></i>
            <input type="text" id="nif" name="nif" class="form-control" placeholder="Ex. 500 123 456" required>
          </div>
        </div>

        <div class="form-group full-width">
          <label class="form-label" for="region">Região de Operação</label>
          <div class="input-wrapper">
            <i class="fas fa-map-location-dot input-icon"></i>
            <select id="region" name="region" class="form-control" required style="appearance: none; cursor: pointer;">
              <option value="Lisboa">Lisboa</option>
              <option value="Porto" selected>Porto</option>
              <option value="Vila Nova de Gaia">Vila Nova de Gaia</option>
              <option value="Amadora">Amadora</option>
              <option value="Braga">Braga</option>
              <option value="Coimbra">Coimbra</option>
              <option value="Funchal">Funchal</option>
              <option value="Setúbal">Setúbal</option>
              <option value="Almada">Almada</option>
              <option value="Queluz">Queluz</option>
              <option value="Barreiro">Barreiro</option>
              <option value="Aveiro">Aveiro</option>
              <option value="Viseu">Viseu</option>
              <option value="Faro">Faro</option>
              <option value="Évora">Évora</option>
              <option value="Ponta Delgada">Ponta Delgada</option>
              <option value="Guimarães">Guimarães</option>
              <option value="Cascais">Cascais</option>
              <option value="Sintra">Sintra</option>
            </select>
          </div>
        </div>

        <div class="form-group full-width">
          <label class="form-label" for="address">Morada Completa do Local</label>
          <textarea id="address" name="address" class="form-control" placeholder="Rua, número, localidad..." required></textarea>
        </div>

        <button type="submit" class="btn-submit full-width">
          <span>Registar Estabelecimento</span>
          <i class="fas fa-circle-check"></i>
        </button>
      </div>
    </form>

    <p class="footer-text">
      Já tem uma conta de restaurante? 
      <a href="{{ url_for('apps_view_blueprint.restaurant_login') }}" class="footer-link">Faça login aqui</a>
    </p>
  </div>

  <script>
    function togglePasswordVisibility(inputId, icon) {
      const input = document.getElementById(inputId);
      if (input.type === "password") {
        input.type = "text";
        icon.className = "fas fa-eye-slash";
        icon.style.color = "var(--brand-green)";
      } else {
        input.type = "password";
        icon.className = "fas fa-eye";
        icon.style.color = "var(--text-muted)";
      }
    }
  </script>
</body>
</html>
